<body class="bg-paper text-ink font-body">

    <header id="top" class="max-w-5xl mx-auto px-6 py-6 flex items-center justify-between">
        <a href="/" class="font-display font-extrabold text-lg">DA</a>
        <nav class="flex gap-6 text-xs uppercase tracking-wide font-medium">
            <a href="/work/" class="link-underline hover:text-brand">Work</a>
            <a href="/about/" class="link-underline hover:text-brand">About</a>
            <a href="/contact/" class="text-brand border-b-2 border-brand pb-1">Contact</a>
        </nav>
    </header>

    <section class="max-w-5xl mx-auto px-6 py-24">
        <h1 class="font-display font-extrabold text-4xl md:text-6xl leading-[1.15] tracking-tight">Let's talk</h1>
        <p class="text-gray-600 mt-6 max-w-xl leading-relaxed">
            Have a project in mind, or just want to say hello? Reach out and I'll get back to
            you soon.
        </p>
        <div class="mt-10 flex flex-wrap items-center gap-4">
            <a href="mailto:hello@drewalfano.com" class="group link-underline inline-flex items-center gap-2 font-body font-medium text-lg md:text-xl text-ink hover:text-brand focus-visible:text-brand">
                hello@drewalfano.com
                <span class="inline-block transition-transform duration-200 ease-out group-hover:translate-x-1 group-focus-visible:translate-x-1" aria-hidden="true">&rarr;</span>
            </a>
            <button type="button" id="copy-email-btn" class="inline-flex items-center border border-ink px-3 py-1.5 text-xs font-body font-medium uppercase tracking-wide transition-colors duration-200 ease-out hover:bg-ink hover:text-paper">
                <span id="copy-btn-label">Copy</span>
            </button>
        </div>
        <p id="copy-status" class="sr-only" aria-live="polite"></p>

        <div class="mt-16 grid grid-cols-2 gap-8 max-w-md text-sm">
            <div>
                <span class="text-gray-400 block">Location</span>
                <span class="mt-1 block">Sault Ste. Marie, ON</span>
            </div>
            <div>
                <span class="text-gray-400 block">Availability</span>
                <span class="mt-1 flex items-center gap-2">
                    <span class="inline-block w-2 h-2 shrink-0 rounded-full bg-[#2E7D32]" aria-hidden="true"></span>
                    Open to new projects
                </span>
            </div>
        </div>
    </section>

    <footer class="max-w-5xl mx-auto px-6 py-10 flex flex-col md:flex-row items-center justify-between gap-4 text-sm text-gray-500 border-t border-gray-200">
        <span class="font-body">&copy; 2026 Drew Alfano</span>
        <a href="mailto:hello@drewalfano.com" class="link-underline hover:text-brand">hello@drewalfano.com</a>
    </footer>

    <script>
        (function () {
            var btn = document.getElementById("copy-email-btn");
            var label = document.getElementById("copy-btn-label");
            var status = document.getElementById("copy-status");
            if (!btn) return;

            var email = "hello@drewalfano.com";
            var resetTimer;

            function announce(copied) {
                label.textContent = copied ? "Copied ✓" : "Copy";
                status.textContent = copied
                    ? "Email address copied to clipboard."
                    : "Couldn't copy the email address. You can select and copy it manually.";
                clearTimeout(resetTimer);
                if (copied) {
                    resetTimer = setTimeout(function () {
                        label.textContent = "Copy";
                        status.textContent = "";
                    }, 2000);
                }
            }

            function fallbackCopy() {
                var textarea = document.createElement("textarea");
                textarea.value = email;
                textarea.setAttribute("readonly", "");
                textarea.style.position = "absolute";
                textarea.style.left = "-9999px";
                document.body.appendChild(textarea);
                textarea.select();
                var copied = false;
                try {
                    copied = document.execCommand("copy");
                } catch (err) {
                    copied = false;
                }
                document.body.removeChild(textarea);
                announce(copied);
            }

            btn.addEventListener("click", function () {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(email).then(
                        function () { announce(true); },
                        fallbackCopy
                    );
                } else {
                    fallbackCopy();
                }
            });
        })();
    </script>

    <script src="/assets/js/site.js" defer></script>
</body>
</html>
